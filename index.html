<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Social Page</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Font Awesome Icons -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <!-- Avatar -->
    <div class="avatar">
        <img src="images/avatar-2.jpg" alt="avatar">
    </div>

    <!-- Name -->
    <h1 class="name">Your Name</h1>

    <!-- Social Links -->
    <div class="social-list">

        <!-- YouTube -->
        <a class="social-item youtube" href="#">
            <i class="fa-brands fa-youtube"></i>

            <div class="social-text">
                <span>YouTube</span>
                <small id="yt-subs"></small>
            </div>
        </a>

        <a class="social-item youtube" href="#">
            <div class="icon">
                <i class="fa-brands fa-youtube"></i>
            </div>

            <div class="social-text">
                <span>YouTube</span>
                <small id="yt-subs"></small>
            </div>
        </a>

        <!-- Facebook -->
        <a class="social-item facebook" href="#">
            <div class="icon">
                <i class="fa-brands fa-facebook"></i>
            </div>
            <span>Facebook</span>
        </a>

        <a class="social-item youtube" href="#">
            <div class="icon">
                <i class="fa-brands fa-youtube"></i>
            </div>

            <div class="social-text">
                <span>YouTube</span>
                <small id="yt-subs"></small>
            </div>
        </a>

        <a class="social-item youtube" href="#">
            <div class="icon">
                <i class="fa-brands fa-youtube"></i>
            </div>

            <div class="social-text">
                <span>YouTube</span>
                <small id="yt-subs"></small>
            </div>
        </a>
                
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
